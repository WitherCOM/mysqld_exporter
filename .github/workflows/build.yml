name: Go

on:
  push:
    tags:  
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log into registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with: 
          images: ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},suffix=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ github.ref_name }}
            type=semver,pattern={{major}},suffix=${{ github.ref_name }}
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v3
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}